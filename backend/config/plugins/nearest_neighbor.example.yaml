# Example config for nearest_neighbor.
#
# For robust distance calculation, install shapely:
#   pip install shapely
#
# This plugin performs planar nearest-neighbor search.
# For geographic CRS like EPSG:4326, reproject first using crs_transformer.

default_engine: auto          # auto | shapely | python
default_k: 1                  # number of nearest targets per source
max_k: 100
coordinate_precision: 6       # null means no rounding
preserve_properties: true
drop_unmatched: false
include_target_geometry: false

source_crs: null
warn_if_geographic_crs: true

fields:
  distance_field: _nearest_distance
  rank_field: _neighbor_rank
  source_index_field: _source_index
  target_index_field: _target_index
  status_field: _nearest_status
  engine_field: _nearest_engine
  target_properties_field: _target_properties
  target_geometry_field: _target_geometry
