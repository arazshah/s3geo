# Example config for wms_wfs_fetcher.
# Copy to wms_wfs_fetcher.yaml and adjust for your environment.
#
# This file can define multiple online OGC services and friendly layer aliases.

default_service: geoserver_local

services:
  geoserver_local:
    wfs_url: http://localhost:8080/geoserver/wfs
    wms_url: http://localhost:8080/geoserver/wms

    default_crs: EPSG:4326
    timeout: 30

    default_wfs_version: 2.0.0
    default_wms_version: 1.3.0

    default_wfs_output_format: application/json
    default_wms_image_format: image/geotiff

    default_width: 1024
    default_height: 1024
    output_dir: output/plugins/wms_wfs_fetcher

    layers:
      roads:
        type_name: workspace:roads
        wms_layer: workspace:roads
        style: ""

      buildings:
        type_name: workspace:buildings
        wms_layer: workspace:buildings
        style: ""

  production:
    wfs_url_env: PRODUCTION_WFS_URL
    wms_url_env: PRODUCTION_WMS_URL

    default_crs: EPSG:4326
    timeout: 30

    default_wfs_version: 2.0.0
    default_wms_version: 1.3.0

    default_wfs_output_format: application/json
    default_wms_image_format: image/png

    default_width: 1024
    default_height: 1024
    output_dir: output/plugins/wms_wfs_fetcher

    layers: {}
