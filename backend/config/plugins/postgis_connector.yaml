default_profile: local

profiles:
  osm_tehran:
    host: localhost
    port: 5433
    database: osm_tehran
    user: postgres
    password_env: POSTGIS_PASSWORD
    connect_timeout: 10
    default_schema: public
    default_geom_col: way
    default_limit: 10000
    output_srid: 4326

  local:
    host: localhost
    port: 5432
    database: gis
    user: postgres
    password_env: POSTGIS_PASSWORD

    default_schema: public
    default_geom_col: geom
    default_limit: 10000
    output_srid: 4326
    connect_timeout: 10
