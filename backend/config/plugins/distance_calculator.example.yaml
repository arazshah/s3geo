# Example config for distance_calculator.
#
# For robust geometry distance calculation, install shapely:
#   pip install shapely
#
# This plugin performs planar distance calculation.
# For geographic CRS such as EPSG:4326, reproject first using crs_transformer.

default_engine: auto          # auto | shapely | python
default_mode: nearest         # nearest | pairwise
coordinate_precision: 6       # null means no rounding
preserve_properties: true
drop_failed: false

# Optional CRS hint. Does not transform data.
source_crs: null
warn_if_geographic_crs: true

fields:
  distance_field: _distance
  source_index_field: _source_index
  target_index_field: _target_index
  status_field: _distance_status
  engine_field: _distance_engine
  mode_field: _distance_mode
  target_properties_field: _target_properties
