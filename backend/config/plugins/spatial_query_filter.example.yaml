# Example config for spatial_query_filter.
#
# This plugin filters GeoJSON-like vector features by:
#   - attribute predicates
#   - geometry type
#   - bbox relation
#   - sorting and pagination
#
# No external dependency is required.

case_sensitive: false
default_bbox_mode: intersects     # intersects | within
preserve_properties: true

default_limit: null               # null means no limit
default_offset: 0
max_limit: 10000

fields:
  add_source_index: true
  add_filter_status: true
  source_index_field: _source_index
  filter_status_field: _filter_status
