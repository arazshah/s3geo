<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>s3geo.com – Smart Spatial System</title>
    <style>
        /* ----- RESET & GLOBAL ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #fff;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ----- FROSTED BACKGROUND (mimics dashboard UI) ----- */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                /* left sidebar – dark panel */
                radial-gradient(ellipse 180px 100% at 0% 50%, rgba(0, 20, 40, 0.9) 0%, transparent 70%),
                /* right panel – subtle blue-gray */
                radial-gradient(ellipse 140px 80% at 90% 20%, rgba(0, 60, 120, 0.25) 0%, transparent 60%),
                /* center map area – lighter, green-blue hints */
                radial-gradient(circle 400px at 50% 50%, rgba(0, 255, 136, 0.08) 0%, transparent 50%),
                radial-gradient(circle 300px at 30% 60%, rgba(0, 102, 255, 0.12) 0%, transparent 50%),
                /* grid lines mimicking map tiles */
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 40px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 40px),
                /* base dark navy */
                linear-gradient(145deg, #0a0a1a 0%, #0f1a2a 100%);
            background-blend-mode: overlay, normal, normal, normal, normal, normal, normal;
            filter: blur(4px) saturate(0.7);
            transform: scale(1.02);  /* hide edge blur */
        }

        /* additional floating geometric particles (CSS only) */
        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-particles span {
            position: absolute;
            display: block;
            width: 6px;
            height: 6px;
            background: rgba(0, 255, 136, 0.15);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.1);
            animation: floatParticle 18s infinite alternate ease-in-out;
        }

        .bg-particles span:nth-child(1) { top: 10%; left: 5%; width: 10px; height: 10px; animation-duration: 22s; }
        .bg-particles span:nth-child(2) { top: 70%; left: 80%; width: 14px; height: 14px; background: rgba(0, 102, 255, 0.12); animation-duration: 26s; }
        .bg-particles span:nth-child(3) { top: 40%; left: 20%; width: 8px; height: 8px; animation-duration: 20s; }
        .bg-particles span:nth-child(4) { top: 85%; left: 40%; width: 18px; height: 18px; background: rgba(0, 255, 136, 0.08); animation-duration: 30s; }
        .bg-particles span:nth-child(5) { top: 20%; left: 70%; width: 12px; height: 12px; background: rgba(0, 102, 255, 0.2); animation-duration: 24s; }
        .bg-particles span:nth-child(6) { top: 55%; left: 10%; width: 7px; height: 7px; animation-duration: 28s; }
        .bg-particles span:nth-child(7) { top: 5%; left: 90%; width: 16px; height: 16px; background: rgba(0, 255, 136, 0.1); animation-duration: 19s; }
        .bg-particles span:nth-child(8) { top: 60%; left: 60%; width: 9px; height: 9px; animation-duration: 23s; }

        @keyframes floatParticle {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0.2; }
            50% { transform: translate(30px, -30px) scale(1.2); opacity: 0.7; }
            100% { transform: translate(-20px, 20px) scale(0.9); opacity: 0.3; }
        }

        /* ----- GLASS CARD (foreground) ----- */
        .glass-card {
            position: relative;
            z-index: 10;
            max-width: 580px;
            width: 100%;
            padding: 2.8rem 2.2rem;
            background: rgba(10, 10, 26, 0.45);
            backdrop-filter: blur(14px) saturate(1.2);
            -webkit-backdrop-filter: blur(14px) saturate(1.2);
            border-radius: 48px;
            border: 1px solid rgba(0, 255, 136, 0.15);
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(0, 255, 136, 0.05) inset;
            text-align: center;
            animation: fadeSlideIn 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
            transform: translateY(20px) scale(0.97);
            transition: box-shadow 0.3s;
        }

        .glass-card:hover {
            box-shadow: 0 40px 70px -20px #00ff8822, 0 0 0 1px rgba(0, 255, 136, 0.2) inset;
        }

        @keyframes fadeSlideIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ----- LOGO (S³GEO) ----- */
        .logo {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 0.25rem;
            display: inline-block;
            background: linear-gradient(135deg, #00ff88 0%, #0066ff 70%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            animation: pulseGlow 3s ease-in-out infinite;
            line-height: 1.2;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 20px rgba(0, 255, 136, 0.1); filter: brightness(1); }
            50% { text-shadow: 0 0 45px rgba(0, 255, 136, 0.4), 0 0 80px rgba(0, 102, 255, 0.2); filter: brightness(1.1); }
            100% { text-shadow: 0 0 20px rgba(0, 255, 136, 0.1); filter: brightness(1); }
        }

        .logo-sub {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-top: -0.6rem;
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, #00ff88, #0066ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0.7;
        }

        /* ----- TAGLINE ----- */
        .tagline {
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin: 0.5rem 0 0.8rem;
            background: linear-gradient(135deg, #e0f0ff, #b0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .status {
            font-size: 1.1rem;
            background: rgba(0, 255, 136, 0.08);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            margin-bottom: 2rem;
            color: #d0ffe0;
        }

        /* ----- PROGRESS BAR ----- */
        .progress-wrap {
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            height: 8px;
            width: 100%;
            margin: 1.8rem 0 1.2rem;
            overflow: hidden;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.4);
        }

        .progress-bar {
            height: 8px;
            width: 0%;
            background: linear-gradient(90deg, #00ff88, #0066ff);
            border-radius: 60px;
            animation: progressAnim 2.4s ease-in-out infinite;
            box-shadow: 0 0 16px #00ff8866;
        }

        @keyframes progressAnim {
            0% { width: 0%; margin-left: 0; }
            50% { width: 70%; margin-left: 5%; }
            100% { width: 0%; margin-left: 95%; }
        }

        .progress-label {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 1.8rem;
        }

        /* ----- EMAIL FORM ----- */
        .notify-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin: 1.8rem 0 1.2rem;
        }

        .notify-form input {
            flex: 2 1 200px;
            padding: 0.9rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.25s, box-shadow 0.25s;
            font-family: inherit;
        }

        .notify-form input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
        }

        .notify-form input::placeholder {
            color: rgba(255,255,255,0.3);
            font-weight: 300;
        }

        .notify-form button {
            flex: 0 1 auto;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            border: none;
            background: linear-gradient(145deg, #00ff88, #0066ff);
            color: #0a0a1a;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.25s;
            box-shadow: 0 4px 14px rgba(0, 255, 136, 0.25);
            font-family: inherit;
            white-space: nowrap;
        }

        .notify-form button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(0, 255, 136, 0.4);
        }

        .notify-form button:active {
            transform: scale(0.97);
        }

        .form-feedback {
            min-height: 1.6rem;
            font-size: 0.9rem;
            color: #00ff88;
            margin: 0.2rem 0 0.8rem;
        }

        /* ----- FOOTER ----- */
        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1.5rem;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 500px) {
            .glass-card {
                padding: 2rem 1.2rem;
                border-radius: 32px;
            }
            .logo {
                font-size: 3.2rem;
            }
            .tagline {
                font-size: 1.3rem;
            }
            .notify-form input {
                padding: 0.75rem 1rem;
            }
            .notify-form button {
                padding: 0.75rem 1.5rem;
            }
        }

        /* google font import */
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap');
    </style>
</head>
<body>
    <!-- background layers -->
    <div class="bg-layer" aria-hidden="true"></div>
    <div class="bg-particles" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <!-- main glass card -->
    <main class="glass-card">
        <div class="logo">S³GEO</div>
        <div class="logo-sub">smart spatial system</div>
        <div class="tagline">Smart Spatial System</div>
        <div class="status">🚧 Under Construction — Coming Soon</div>

        <!-- progress animation -->
        <div class="progress-wrap">
            <div class="progress-bar"></div>
        </div>
        <div class="progress-label">building the future of geospatial intelligence</div>

        <!-- email CTA -->
        <form class="notify-form" id="notifyForm" action="#" method="post">
            <input type="email" id="notifyEmail" placeholder="your@email.com" required aria-label="Email for notification">
            <button type="submit" id="notifyBtn">Notify Me</button>
        </form>
        <div class="form-feedback" id="formFeedback"></div>

        <div class="footer">© 2026 s3geo.com. All rights reserved.</div>
    </main>

    <script>
        (function() {
            const form = document.getElementById('notifyForm');
            const emailInput = document.getElementById('notifyEmail');
            const feedback = document.getElementById('formFeedback');
            const btn = document.getElementById('notifyBtn');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const email = emailInput.value.trim();
                if (!email) {
                    feedback.textContent = '⚠️ please enter your email.';
                    feedback.style.color = '#ffaa66';
                    return;
                }
                // simple email validation
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    feedback.textContent = '⚠️ please enter a valid email.';
                    feedback.style.color = '#ffaa66';
                    return;
                }

                // simulate success
                feedback.textContent = '✅ we’ll notify you at ' + email + ' — stay tuned!';
                feedback.style.color = '#00ff88';
                emailInput.value = '';
                btn.textContent = '✓ Subscribed';
                setTimeout(() => {
                    btn.textContent = 'Notify Me';
                }, 2500);
            });

            // reset feedback on input
            emailInput.addEventListener('input', function() {
                if (feedback.textContent) {
                    feedback.textContent = '';
                }
                if (btn.textContent !== 'Notify Me') {
                    btn.textContent = 'Notify Me';
                }
            });
        })();
    </script>
</body>
</html>
